services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
      POSTGRES_DB: industryconnect
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d industryconnect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/industryconnect
      TEST_DATABASE_URL: postgresql://appuser:apppassword@postgres:5432/industryconnect_test
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      POLL_INTERVAL_SECONDS: ${POLL_INTERVAL_SECONDS:-60}
      POLL_SOURCE_URL: ${POLL_SOURCE_URL:-}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-10485760}
      TOKEN_THRESHOLD: ${TOKEN_THRESHOLD:-4000}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
