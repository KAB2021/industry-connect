name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: industryconnect_test
        options: >-
          --health-cmd "pg_isready -U postgres -d industryconnect_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alembic migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/industryconnect_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/industryconnect_test
          OPENAI_API_KEY: sk-test-placeholder
          OPENAI_MODEL: gpt-4o-mini
        run: alembic upgrade head

      - name: Lint with ruff
        run: ruff check .

      - name: Type check with mypy
        run: mypy app/

      - name: Run tests with pytest
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/industryconnect_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/industryconnect_test
          OPENAI_API_KEY: sk-test-placeholder
          OPENAI_MODEL: gpt-4o-mini
        run: pytest --tb=short -q
